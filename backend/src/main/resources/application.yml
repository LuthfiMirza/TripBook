spring:
  application:
    name: tripbook-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tripbook}
    username: ${SPRING_DATASOURCE_USERNAME:tripbook}
    password: ${SPRING_DATASOURCE_PASSWORD:tripbook}

  jpa:
    # Flyway owns the schema — Hibernate must never create or alter tables.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    # Dev-only fallback secret (32+ bytes for HS256). Override with the
    # JWT_SECRET env var in any real deployment.
    secret: ${JWT_SECRET:tripbook-dev-only-secret-please-override-in-prod-0123456789}
    expiration-ms: 86400000 # 24h
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:3000}

logging:
  level:
    org.flywaydb: INFO
