spring:
  application:
    name: tripbook-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tripbook}
    username: ${SPRING_DATASOURCE_USERNAME:tripbook}
    password: ${SPRING_DATASOURCE_PASSWORD:tripbook}

  jpa:
    # Flyway owns the schema — Hibernate must never create or alter tables.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    org.flywaydb: INFO
