services:
  postgres:
    image: postgres:16
    container_name: tripbook-postgres
    environment:
      POSTGRES_DB: tripbook
      POSTGRES_USER: tripbook
      POSTGRES_PASSWORD: tripbook
    # Host port is parametrized so TripBook can coexist with another local
    # Postgres. Default stays 5432; override with TRIPBOOK_DB_PORT if it's taken.
    ports:
      - "${TRIPBOOK_DB_PORT:-5432}:5432"
    volumes:
      - tripbook-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripbook -d tripbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tripbook-redis
    ports:
      - "${TRIPBOOK_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: tripbook-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend-1:
    build:
      context: ../backend
    environment:
      INSTANCE_ID: backend-1
      JAVA_TOOL_OPTIONS: -Dlogging.level.org.hibernate.SQL=DEBUG
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tripbook
      SPRING_DATASOURCE_USERNAME: tripbook
      SPRING_DATASOURCE_PASSWORD: tripbook
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  backend-2:
    build:
      context: ../backend
    environment:
      INSTANCE_ID: backend-2
      JAVA_TOOL_OPTIONS: -Dlogging.level.org.hibernate.SQL=DEBUG
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tripbook
      SPRING_DATASOURCE_USERNAME: tripbook
      SPRING_DATASOURCE_PASSWORD: tripbook
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
    ports:
      - "8080:8080"
    depends_on:
      - backend-1
      - backend-2

volumes:
  tripbook-postgres-data:
